name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Diagnose tklinenums
        run: |
            pip show tklinenums
            python -c "import tklinenums; print('module file:', tklinenums.__file__)"
            python -c "from PyInstaller.utils.hooks import collect_all; d,b,h = collect_all('tklinenums'); print('datas:', d); print('binaries:', b); print('hidden:', h)"

      - name: Build with PyInstaller
        run: pyinstaller pyinstaller.spec

      - name: Package artifact (Linux)
        run: |
          cd dist
          tar -czf CTkDesigner-linux-x64.tar.gz CTkDesigner
          ls -lah CTkDesigner*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/CTkDesigner-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller pyinstaller.spec

      - name: Package artifact (Windows)
        run: |
          cd dist
          Compress-Archive -Path CTkDesigner.exe -DestinationPath CTkDesigner-windows-x64.zip
          dir CTkDesigner*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/CTkDesigner-windows-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-binary/CTkDesigner-linux-x64.tar.gz
            artifacts/windows-binary/CTkDesigner-windows-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}